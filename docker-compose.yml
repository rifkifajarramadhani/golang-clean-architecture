volumes:
  db_data:

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: air -c .air.toml
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      DATABASE_HOST: db
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: air -c .air.worker.toml
    volumes:
      - .:/app
    environment:
      DATABASE_HOST: db
      QUEUE_DRIVER: ${QUEUE_DRIVER:-redis}
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: go run ./cmd/scheduler
    volumes:
      - .:/app
    environment:
      DATABASE_HOST: db
      QUEUE_DRIVER: ${QUEUE_DRIVER:-redis}
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: greygoose
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: db_name
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pgreygoose"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.27.8
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
