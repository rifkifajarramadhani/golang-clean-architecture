x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-go-service}
  APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
  DATABASE_HOST: db
  DATABASE_PORT: 3306
  DATABASE_USER: ${DATABASE_USER}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD}
  DATABASE_NAME: ${DATABASE_NAME}
  AUTH_JWT_ACCESS_SECRET: ${AUTH_JWT_ACCESS_SECRET}
  AUTH_JWT_REFRESH_SECRET: ${AUTH_JWT_REFRESH_SECRET}
  REDIS_ADDRESS: redis:6379
  MAIL_HOST: mailpit

x-app-depends: &app-depends
  db:
    condition: service_healthy
  redis:
    condition: service_healthy

volumes:
  db_data:

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: air -c .air.toml
    ports: ["8080:8080"]
    volumes: [".:/app"]
    environment: *app-environment
    depends_on: *app-depends

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: air -c .air.worker.toml
    volumes: [".:/app"]
    environment: *app-environment
    depends_on:
      <<: *app-depends
      mailpit:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: go run ./cmd/scheduler
    volumes: [".:/app"]
    environment: *app-environment
    depends_on: *app-depends

  db:
    image: mysql:8.4
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes: ["db_data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.27
    ports: ["1025:1025", "8025:8025"]
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
