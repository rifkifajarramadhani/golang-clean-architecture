volumes:
  db_data:
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=greygoose
      - DB_NAME=db_name
    depends_on:
      - db
  db:
    image: mysql:latest
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: greygoose
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: db_name
    volumes:
      - db_data:/var/lib/mysql
