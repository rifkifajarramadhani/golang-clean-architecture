app:
  name: go-service
  environment: development
  port: 8080

http:
  body_limit_bytes: 1048576
  request_timeout_seconds: 15
  cors_allowed_origins:
    - http://localhost:3000
  auth_rate_limit: 20

database:
  host: db
  port: 3306
  user: root
  password: ""
  name: app
  max_open_connections: 25
  max_idle_connections: 5
  connection_max_minutes: 30

auth:
  jwt_access_secret: ""
  jwt_refresh_secret: ""
  access_ttl_minutes: 15
  refresh_ttl_hours: 168
  issuer: go-service
  audience: go-service

redis:
  address: redis:6379
  password: ""
  db: 0

queue:
  concurrency: 10
  shutdown_seconds: 30
  queues:
    default: 3
    mail: 2
    maintenance: 1

scheduler:
  timezone: UTC

mail:
  host: mailpit
  port: 1025
  username: ""
  password: ""
  encryption: none
  from_address: hello@example.com
  from_name: Golang Clean Architecture
