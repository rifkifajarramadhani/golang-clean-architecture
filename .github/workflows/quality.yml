name: quality

on:
  push:
    branches: [main, architecture-rework]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"
  GOLANGCI_LINT_VERSION: v2.12

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  vulnerability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: greygoose
          MYSQL_DATABASE: db_name
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pgreygoose"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go install -tags mysql github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
      - run: migrate -database 'mysql://root:greygoose@tcp(localhost:3306)/db_name' -path internal/adapter/mysql/migrations up
      - run: go test ./internal/adapter/queue -run DatabaseQueue
        env:
          QUEUE_TEST_MYSQL_DSN: root:greygoose@tcp(localhost:3306)/db_name?parseTime=true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
