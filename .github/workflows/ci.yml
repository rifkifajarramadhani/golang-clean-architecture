name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root-test-password
          MYSQL_DATABASE: app_test
          MYSQL_USER: app
          MYSQL_PASSWORD: app-test-password
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uapp -papp-test-password"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      APP_ENVIRONMENT: test
      DATABASE_HOST: 127.0.0.1
      DATABASE_USER: app
      DATABASE_PASSWORD: app-test-password
      DATABASE_NAME: app_test
      AUTH_JWT_ACCESS_SECRET: ci-access-secret-at-least-thirty-two-characters
      AUTH_JWT_REFRESH_SECRET: ci-refresh-secret-at-least-thirty-two-characters
      REDIS_ADDRESS: 127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install checks
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go install -tags mysql github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
      - name: Migrations up and down
        run: |
          migrate -database 'mysql://app:app-test-password@tcp(127.0.0.1:3306)/app_test' -path internal/platform/database/migrations up
          migrate -database 'mysql://app:app-test-password@tcp(127.0.0.1:3306)/app_test' -path internal/platform/database/migrations down -all
          migrate -database 'mysql://app:app-test-password@tcp(127.0.0.1:3306)/app_test' -path internal/platform/database/migrations up
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - name: Integration tests
        env:
          IDENTITY_TEST_MYSQL_DSN: app:app-test-password@tcp(127.0.0.1:3306)/app_test?parseTime=true
        run: go test -tags=integration ./...
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
      - run: go build ./cmd/...
      - run: govulncheck ./...
      - run: docker build --build-arg TARGET=server .
