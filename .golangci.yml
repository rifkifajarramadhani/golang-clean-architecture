version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod
  tests: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - depguard
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    depguard:
      rules:
        core:
          files:
            - internal/auth/**/*.go
            - internal/user/**/*.go
            - internal/mail/**/*.go
            - internal/queue/**/*.go
            - internal/scheduler/**/*.go
          deny:
            - pkg: github.com/rifkifajarramadhani/golang-clean-architecture/internal/adapter
              desc: core packages must not import adapters
            - pkg: github.com/rifkifajarramadhani/golang-clean-architecture/internal/bootstrap
              desc: core packages must not import bootstrap wiring
            - pkg: github.com/rifkifajarramadhani/golang-clean-architecture/internal/config
              desc: core packages must not import application configuration
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
